apiVersion: v1
kind: Service
metadata:
  name: model-router
  labels:
    app: model-router
spec:
  selector:
    app: model-router
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: metrics
      port: 9190
      targetPort: 9190
      protocol: TCP
  type: ClusterIP
