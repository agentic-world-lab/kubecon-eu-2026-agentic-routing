apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-router
  labels:
    app: model-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-router
  template:
    metadata:
      labels:
        app: model-router
    spec:
      containers:
        - name: model-router
          image: antonioberben/semantic-router:latest
          ports:
            - containerPort: 50051
              name: grpc
              protocol: TCP
            - containerPort: 9190
              name: metrics
              protocol: TCP
          env:
            - name: CONFIG_FILE
              value: /app/config/config.yaml
            - name: LOG_LEVEL
              value: info
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: model-router-config
