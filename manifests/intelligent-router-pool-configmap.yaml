apiVersion: v1
kind: ConfigMap
metadata:
  name: intelligent-router-pool
  namespace: intelligent-router-system
  labels:
    app.kubernetes.io/name: intelligent-router
data:
  pool.yaml: |
    kind: IntelligentPool
    metadata:
      name: model-pool
      namespace: intelligent-router-system
    spec:
      defaultModel: "gpt-4.1-mini"
      models:
        - name: "gpt-4.1"
          pricing:
            inputTokenPrice: 0.002
            outputTokenPrice: 0.008
          domains: ["finance", "health", "legal"]
          averageLatencyMs: 120

        - name: "gpt-5-mini"
          pricing:
            inputTokenPrice: 0.001
            outputTokenPrice: 0.004
          domains: ["science"]
          averageLatencyMs: 100

        - name: "gpt-4.1-mini"
          pricing:
            inputTokenPrice: 0.0004
            outputTokenPrice: 0.0016
          domains: ["technology", "general"]
          averageLatencyMs: 85
