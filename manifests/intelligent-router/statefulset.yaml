# StatefulSet for the intelligent-router ExtProc server.
#
# Config is built dynamically from LLMBackend CRs discovered across all namespaces.
# No ConfigMap or IntelligentRouterConfig CR needed.
#
# The mmBERT-32K intent classifier model is downloaded at first startup by the
# init container and stored on a PersistentVolumeClaim so subsequent restarts
# skip the download (~2 GB for base + LoRA adapter combined).
#
# Requires:
#   - Secret "huggingface-api-key" with key "HF_TOKEN" in the namespace
#   - RBAC from manifests/rbac.yaml (ServiceAccount + ClusterRole)
#   - LLMBackend CRs with status.phase=Evaluated (any namespace)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: intelligent-router
  namespace: intelligent-router-system
  labels:
    app.kubernetes.io/name: intelligent-router
spec:
  serviceName: intelligent-router-headless
  replicas: 1
  selector:
    matchLabels:
      app: intelligent-router
  volumeClaimTemplates:
    - metadata:
        name: model-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
  template:
    metadata:
      labels:
        app: intelligent-router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: intelligent-router
      securityContext:
        fsGroup: 10101
      initContainers:
        - name: download-bert-model
          image: curlimages/curl:latest
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-api-key
                  key: HF_TOKEN
          command:
            - sh
            - -c
            - |
              set -e
              MODEL_DIR="/app/models/domain-classifier"
              BASE_DIR="/app/models/mmbert-32k-yarn"
              MARKER="${MODEL_DIR}/.download-complete"

              if [ -f "$MARKER" ]; then
                echo "Model already downloaded, skipping."
                ls -lh "$MODEL_DIR"
                exit 0
              fi

              mkdir -p "$MODEL_DIR" "$BASE_DIR"
              AUTH="-H 'Authorization: Bearer ${HF_TOKEN}'"
              HF="https://huggingface.co"

              echo "==> Downloading mmBERT-32K base model (~1.9 GB)..."
              BASE_URL="${HF}/llm-semantic-router/mmbert-32k-yarn/resolve/main"
              for f in config.json tokenizer.json tokenizer_config.json special_tokens_map.json model.safetensors; do
                echo "  Downloading base/${f}..."
                curl -fSL -H "Authorization: Bearer ${HF_TOKEN}" \
                  -o "${BASE_DIR}/${f}" "${BASE_URL}/${f}"
              done

              echo "==> Downloading mmBERT-32K intent classifier LoRA adapter..."
              LORA_URL="${HF}/llm-semantic-router/mmbert32k-intent-classifier-lora/resolve/main"
              for f in adapter_config.json adapter_model.safetensors tokenizer.json tokenizer_config.json special_tokens_map.json; do
                echo "  Downloading lora/${f}..."
                curl -fSL -H "Authorization: Bearer ${HF_TOKEN}" \
                  -o "${MODEL_DIR}/${f}" "${LORA_URL}/${f}"
              done

              echo "==> Patching adapter_config.json to use local base model path..."
              # Replace the HuggingFace hub base model reference with the local path
              # so the Rust candle code finds it without internet access at runtime.
              sed -i "s|llm-semantic-router/mmbert-32k-yarn|${BASE_DIR}|g" \
                "${MODEL_DIR}/adapter_config.json"

              echo "==> Creating custom category_mapping.json (14 MMLU-Pro classes → 5 router domains)..."
              cat > "${MODEL_DIR}/category_mapping.json" << 'EOF'
              {
                "idx_to_category": {
                  "0": "science",
                  "1": "finance",
                  "2": "science",
                  "3": "technology",
                  "4": "finance",
                  "5": "technology",
                  "6": "health",
                  "7": "legal",
                  "8": "legal",
                  "9": "science",
                  "10": "general",
                  "11": "general",
                  "12": "science",
                  "13": "health"
                }
              }
              EOF

              touch "$MARKER"
              echo "==> All model files downloaded."
              echo "Base model:"
              ls -lh "$BASE_DIR"
              echo "LoRA adapter:"
              ls -lh "$MODEL_DIR"
          volumeMounts:
            - name: model-storage
              mountPath: /app/models

        # Merge LoRA adapter into base model so the Rust classifier finds
        # a single model.safetensors with all weights (backbone + classifier head).
        - name: merge-lora-adapter
          image: python:3.11-slim
          command:
            - python3
            - -c
            - |
              import os, sys

              MODEL_DIR = "/app/models/domain-classifier"
              BASE_DIR = "/app/models/mmbert-32k-yarn"
              MERGED_MARKER = os.path.join(MODEL_DIR, ".merge-complete")
              MERGED_WEIGHTS = os.path.join(MODEL_DIR, "model.safetensors")

              if os.path.exists(MERGED_MARKER) and os.path.exists(MERGED_WEIGHTS):
                  print("Merged model already exists, skipping.")
                  sys.exit(0)

              print("==> Installing peft + transformers (one-time)...")
              os.system("pip install -q peft transformers safetensors torch --no-cache-dir")

              print("==> Merging LoRA adapter into base model...")
              from peft import PeftModel
              from transformers import AutoModelForSequenceClassification, AutoConfig
              import shutil

              # Remove stale symlinks from previous attempts
              for stale in ["config.json", "model.safetensors"]:
                  p = os.path.join(MODEL_DIR, stale)
                  if os.path.islink(p):
                      os.remove(p)

              # Copy config.json from base model so transformers can load the architecture
              shutil.copy2(os.path.join(BASE_DIR, "config.json"), os.path.join(MODEL_DIR, "config.json"))

              # Load base model and LoRA adapter, then merge
              base_model = AutoModelForSequenceClassification.from_pretrained(
                  BASE_DIR, num_labels=14, ignore_mismatched_sizes=True
              )
              lora_model = PeftModel.from_pretrained(base_model, MODEL_DIR)
              merged = lora_model.merge_and_unload()

              # Save merged model as model.safetensors
              merged.save_pretrained(MODEL_DIR, safe_serialization=True)

              # Restore original config.json (save_pretrained overwrites it with a
              # transformers-formatted version that's missing fields the Rust candle
              # code expects, like global_rope_theta), then patch num_labels to 14.
              import json
              with open(os.path.join(BASE_DIR, "config.json")) as f:
                  cfg = json.load(f)
              cfg["num_labels"] = 14
              cfg["id2label"] = {str(i): str(i) for i in range(14)}
              cfg["label2id"] = {str(i): i for i in range(14)}
              with open(os.path.join(MODEL_DIR, "config.json"), "w") as f:
                  json.dump(cfg, f, indent=2)
              print(f"==> Merged model saved to {MODEL_DIR}")

              # Write merge marker
              open(MERGED_MARKER, "w").close()

              # List final files
              for f in sorted(os.listdir(MODEL_DIR)):
                  size = os.path.getsize(os.path.join(MODEL_DIR, f))
                  print(f"  {f}: {size/1024/1024:.1f} MB" if size > 1024*1024 else f"  {f}: {size} B")
          volumeMounts:
            - name: model-storage
              mountPath: /app/models
          resources:
            requests:
              cpu: "500m"
              memory: "4Gi"
            limits:
              cpu: "2000m"
              memory: "8Gi"

      containers:
        - name: intelligent-router
          image: antonioberben/intelligent-router:latest
          imagePullPolicy: Always
          command: ["/app/router"]
          args:
            - "--grpcport=:18080"
            - "--metricsport=:9091"
          env:
            - name: OPTIMIZATION_TARGET
              value: "accuracy"
          ports:
            - name: grpc
              containerPort: 18080
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          volumeMounts:
            - name: model-storage
              mountPath: /app/models
          securityContext:
            runAsNonRoot: true
            runAsUser: 10101
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          readinessProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 30
            periodSeconds: 20
