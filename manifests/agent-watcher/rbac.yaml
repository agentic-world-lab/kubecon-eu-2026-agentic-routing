---
# RBAC manifests for the kagent-event-watcher
# Grants the watcher ServiceAccount the minimum required permissions to
# list and watch v1/Events in the `llmbackend` namespace.
#
# Apply with: kubectl apply -f manifests/rbac.yaml

# -----------------------------------------------------------------------------
# ServiceAccount (lives in the deployment namespace: kagent)
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-watcher
  namespace: kagent
  labels:
    app.kubernetes.io/name: event-watcher
    app.kubernetes.io/component: watcher

---
# -----------------------------------------------------------------------------
# Role (scoped to the target namespace: llmbackend)
# Grants only the verbs required by the design document (list, watch).
# -----------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: event-watcher
  namespace: default
  labels:
    app.kubernetes.io/name: event-watcher
    app.kubernetes.io/component: watcher
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch"]
  - apiGroups: ["edgecloudlabs.edgecloudlabs.com"]
    resources: ["llmbackends"]
    verbs: ["get", "list", "watch"]

---
# -----------------------------------------------------------------------------
# RoleBinding – binds the Role (in llmbackend) to the ServiceAccount (in kagent)
# -----------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: event-watcher
  namespace: default
  labels:
    app.kubernetes.io/name: event-watcher
    app.kubernetes.io/component: watcher
subjects:
  - kind: ServiceAccount
    name: event-watcher
    namespace: kagent          # SA lives in the kagent namespace
roleRef:
  kind: Role
  name: event-watcher
  apiGroup: rbac.authorization.k8s.io
