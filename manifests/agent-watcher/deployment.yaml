---
# Deployment for the kagent-event-watcher
# Runs in the `kagent` namespace and watches the `llmbackend` namespace
# for EvaluationCompleted events.
#
# Apply with: kubectl apply -f manifests/deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-watcher
  namespace: kagent
  labels:
    app.kubernetes.io/name: event-watcher
    app.kubernetes.io/component: watcher
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: event-watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: event-watcher
        app.kubernetes.io/component: watcher
    spec:
      serviceAccountName: event-watcher

      # Ensure only one pod is scheduled (watcher is stateful w.r.t. resourceVersion)
      terminationGracePeriodSeconds: 15

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: watcher
          # TODO: replace with your registry image once built
          # docker build -t <registry>/kagent-event-watcher:1.0.0 .
          image: fjvicens/agent-watcher:1.0.0
          imagePullPolicy: Always

          env:
            - name: WATCH_NAMESPACE
              value: "default"
            - name: EVENT_REASON
              value: "EvaluationCompleted"
            - name: KAGENT_ENDPOINT
              value: "http://kagent-controller:8083/api/a2a/kagent/sr-config-agent/"
            - name: HTTP_MAX_RETRIES
              value: "5"
            - name: HTTP_BACKOFF_SECONDS
              value: "5"
            - name: STREAM_RECONNECT_BACKOFF_SECONDS
              value: "5"
            - name: HTTP_STREAM_TIMEOUT
              value: "60"

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # Simple liveness probe: Python process must still be alive
          # (no HTTP server, so we check that the process file exists)
          livenessProbe:
            exec:
              command: ["python", "-c", "import os; os.getpid()"]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

      restartPolicy: Always
