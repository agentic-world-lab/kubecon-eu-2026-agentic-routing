# Standalone IntelligentRouterConfig CR for the intelligent-router.
# Apply with: kubectl apply -f manifests/intelligent-router-config-cr.yaml
#
# The router watches this CR live via client-go (--cr-watch flag).
# Edit and re-apply to update routing at runtime without a pod restart:
#
#   kubectl apply -f manifests/intelligent-router-config-cr.yaml
#
apiVersion: vllm.ai/v1alpha1
kind: IntelligentRouterConfig
metadata:
  name: config-router
  namespace: intelligent-router-system
  labels:
    app.kubernetes.io/name: intelligent-router
spec:
  pool:
    defaultModel: "gpt-4.1-mini"
    models:
      - name: "gpt-4.1"
        initialAverageLatencyMs: 120
        qualityScores:
          finance: 0.9
          health: 0.8
          legal: 0.7
          general: 0.5
        costScore: 0.8
        endpointType: "public"
        aiInfrastructureType: "gpu_a100"

      - name: "gpt-5-mini"
        initialAverageLatencyMs: 100
        qualityScores:
          technology: 0.9
          science: 0.9
          general: 0.7
          finance: 0.6
        costScore: 0.5
        endpointType: "public"
        aiInfrastructureType: "gpu_h100"

      - name: "gpt-4.1-mini"
        initialAverageLatencyMs: 85
        qualityScores:
          technology: 0.9
          general: 0.8
          finance: 0.5
        costScore: 0.3
        endpointType: "public"
        aiInfrastructureType: "gpu_a100"

  weights:
    quality: 0.6
    latency: 0.2
    cost: 0.2

  tokenBudget:
    enabled: true
    threshold: 500
    quota: 1000
    windowSeconds: 60

  # BERT domain classifier (primary classification signal).
  # The init container downloads llm-semantic-router/mmbert32k-intent-classifier-lora
  # and a custom category_mapping.json to /app/models/domain-classifier.
  # numClasses: 14 (MMLU-Pro categories mapped to 5 router domains via category_mapping.json).
  mlClassifier:
    enabled: true
    modelPath: "/app/models/domain-classifier"
    mappingPath: "/app/models/domain-classifier/category_mapping.json"
    numClasses: 14
    useCPU: true
    threshold: 0.4

  # Keyword rules: fallback when BERT confidence is below threshold or model not loaded.
  keywordRules:
    - name: finance
      operator: OR
      caseSensitive: false
      keywords:
        - stock
        - investment
        - portfolio
        - dividend
        - trading
        - bond
        - equity
        - fund

    - name: legal
      operator: OR
      caseSensitive: false
      keywords:
        - law
        - court
        - contract
        - attorney
        - litigation
        - statute
        - lawsuit
        - jurisdiction

    - name: health
      operator: OR
      caseSensitive: false
      keywords:
        - health
        - medical
        - doctor
        - disease
        - treatment
        - symptom
        - hospital
        - medicine
        - patient

    - name: technology
      operator: OR
      caseSensitive: false
      keywords:
        - software
        - code
        - programming
        - algorithm
        - database
        - framework
        - cloud
        - kubernetes
        - docker

    - name: science
      operator: OR
      caseSensitive: false
      keywords:
        - physics
        - chemistry
        - biology
        - experiment
        - molecule
        - quantum
        - hypothesis
        - laboratory
