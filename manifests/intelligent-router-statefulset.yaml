# StatefulSet for the intelligent-router ExtProc server.
#
# Uses pool+route ConfigMaps for keyword-based domain classification.
# Hot-reloaded every 5 seconds on ConfigMap changes.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: intelligent-router
  namespace: intelligent-router-system
  labels:
    app.kubernetes.io/name: intelligent-router
spec:
  serviceName: intelligent-router-headless   # must match the headless Service
  replicas: 1
  selector:
    matchLabels:
      app: intelligent-router
  template:
    metadata:
      labels:
        app: intelligent-router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: intelligent-router
          image: antonioberben/intelligent-router:latest
          imagePullPolicy: Always
          command: ["/app/router"]
          args:
            - "--grpcport=:18080"
            - "--metricsport=:9091"
            - "--httpport=:8090"
            - "--agentgateway=http://agentgateway-proxy.agentgateway-system"
            - "--pool=/app/config/pool/pool.yaml"
            - "--route=/app/config/route/route.yaml"
          ports:
            - name: grpc
              containerPort: 18080
              protocol: TCP
            - name: http-proxy
              containerPort: 8090
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          volumeMounts:
            - name: router-pool
              mountPath: /app/config/pool
              readOnly: true
            - name: router-route
              mountPath: /app/config/route
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 10101
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 30
            periodSeconds: 20

      volumes:
        - name: router-pool
          configMap:
            name: intelligent-router-pool
        - name: router-route
          configMap:
            name: intelligent-router-route
