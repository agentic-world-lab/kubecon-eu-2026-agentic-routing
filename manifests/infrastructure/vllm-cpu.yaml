apiVersion: v1
kind: Namespace
metadata:
  name: vllm

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models
  namespace: vllm
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 200Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: hf-token-secret
type: Opaque
stringData:
  token: "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"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-cpu
  namespace: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-cpu
  template:
    metadata:
      labels:
        app: vllm-cpu
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:latest
        args:
          - "--model"
          - "meta-llama/Llama-2-7b-hf"
          - "--dtype"
          - "float32"
          - "--device"
          - "cpu"
          - "--port"
          - "8000"
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-cpu
  namespace: vllm
spec:
  selector:
    app: vllm-cpu
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP