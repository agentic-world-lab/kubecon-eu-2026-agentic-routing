# RBAC for the orchestrator agent's LLMBackend watcher.
# The orchestrator (kopf-based) watches LLMBackend CRs across namespaces
# to react to lifecycle events (add, update, delete).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: orchestrator-llmbackend-manager
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/component: rbac
rules:
  # kopf framework: discover CRDs and list namespaces
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # LLMBackend resources
  - apiGroups: ["edgecloudlabs.edgecloudlabs.com"]
    resources: ["llmbackends"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["edgecloudlabs.edgecloudlabs.com"]
    resources: ["llmbackends/status"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: orchestrator-llmbackend-manager
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/component: rbac
subjects:
  - kind: ServiceAccount
    name: orchestrator
    namespace: kagent
roleRef:
  kind: ClusterRole
  name: orchestrator-llmbackend-manager
  apiGroup: rbac.authorization.k8s.io
