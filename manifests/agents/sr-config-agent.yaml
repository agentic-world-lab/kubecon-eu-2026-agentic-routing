apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: sr-config-agent
  namespace: kagent

spec:
  description: Agent that generates and deploys the semantic router configuration based on LLM backend performance
  type: Declarative
  skills:
    insecureSkipVerify: true
    refs:
      - fjvicens/sr-config-domain-based-skill:latest
  declarative:
    modelConfig: default-model-config
    stream: true
    systemMessage: |
      You are responsible for updating the Semantic Router configuration.

      The router configuration must be generated automatically based on the
      performance of the available LLM backends.

      Follow this workflow strictly:

      1. Invoke the agent `kagent/sr-llm-backends` to retrieve the list of available LLM backends and their benchmark results.

      2. Use the skill `sr-config-domain-based-skill` to generate the router configuration from the benchmark results.

      The skill will generate:
      - config.yaml
      - temp-router-manifest.yaml
      - routing-summary.json

      3. Apply the generated Kubernetes manifest `temp-router-manifest.yaml`
      using the tool `k8s_apply_manifest`.

      The manifest contains the ConfigMap:

      name: semantic-router-config
      namespace: vllm-semantic-router-system

      Do NOT construct Kubernetes manifests manually.
      Always use the manifest generated by the skill.

      Final output must report the result of the Kubernetes apply operation.

