apiVersion: v1
kind: ConfigMap
metadata:
  name: intelligent-router-route
  namespace: intelligent-router-system
  labels:
    app.kubernetes.io/name: intelligent-router
data:
  route.yaml: |
    kind: IntelligentRoute
    metadata:
      name: basic-routing
      namespace: intelligent-router-system
    spec:
      signals:
        keywords:
          - name: finance
            operator: OR
            caseSensitive: false
            keywords:
              - stock
              - investment
              - portfolio
              - dividend
              - trading
              - bond
              - equity
              - fund

          - name: health
            operator: OR
            caseSensitive: false
            keywords:
              - health
              - medical
              - doctor
              - disease
              - treatment
              - symptom
              - hospital
              - medicine
              - patient

          - name: legal
            operator: OR
            caseSensitive: false
            keywords:
              - law
              - court
              - contract
              - attorney
              - litigation
              - statute
              - lawsuit
              - jurisdiction

          - name: science
            operator: OR
            caseSensitive: false
            keywords:
              - physics
              - chemistry
              - biology
              - quantum
              - experiment
              - molecule
              - laboratory
              - hypothesis

          - name: technology
            operator: OR
            caseSensitive: false
            keywords:
              - software
              - code
              - programming
              - algorithm
              - database
              - framework
              - kubernetes
              - docker

      weights:
        domain: 0.6
        latency: 0.2
        cost: 0.2
        tokenBudget: 0.0

      tokenBudget:
        threshold: 500
        quota: 1000
        windowSeconds: 60
