apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-webhook-bridge
  namespace: kagent
  labels:
    app: agent-webhook-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-webhook-bridge
  template:
    metadata:
      labels:
        app: agent-webhook-bridge
    spec:
      containers:
        - name: bridge
          image: antonioberben/agent-webhook-bridge:latest
          ports:
            - containerPort: 8443
              name: https
          env:
            - name: KAGENT_ENDPOINT
              value: "http://kagent-controller.kagent.svc.cluster.local:8083"
            - name: AGENT_NAMESPACE
              value: "kagent"
            - name: AGENT_NAME
              value: "intelligent-router-configurator"
            - name: TIMEOUT_SECONDS
              value: "60"
            - name: TLS_CERT_FILE
              value: "/certs/tls.crt"
            - name: TLS_KEY_FILE
              value: "/certs/tls.key"
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: certs
          secret:
            secretName: agent-webhook-bridge-tls
---
apiVersion: v1
kind: Service
metadata:
  name: agent-webhook-bridge
  namespace: kagent
  labels:
    app: agent-webhook-bridge
spec:
  selector:
    app: agent-webhook-bridge
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
