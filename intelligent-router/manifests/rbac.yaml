# RBAC for the intelligent-router CR watcher.
# The router needs get/list/watch on IntelligentRouterConfig CRs so the
# --cr-watch flag can hot-reload config without a pod restart.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: intelligent-router
  namespace: intelligent-router-system
  labels:
    app.kubernetes.io/name: intelligent-router
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: intelligent-router-cr-reader
  labels:
    app.kubernetes.io/name: intelligent-router
rules:
  - apiGroups: ["vllm.ai"]
    resources: ["intelligentrouterconfigs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: intelligent-router-cr-reader
  labels:
    app.kubernetes.io/name: intelligent-router
subjects:
  - kind: ServiceAccount
    name: intelligent-router
    namespace: intelligent-router-system
roleRef:
  kind: ClusterRole
  name: intelligent-router-cr-reader
  apiGroup: rbac.authorization.k8s.io
