# RBAC for the intelligent-router LLMBackend watcher.
# The router watches LLMBackend CRs across all namespaces to discover
# evaluated models and build routing config dynamically.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: intelligent-router
  namespace: intelligent-router-system
  labels:
    app.kubernetes.io/name: intelligent-router
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: intelligent-router-cr-reader
  labels:
    app.kubernetes.io/name: intelligent-router
rules:
  - apiGroups: ["edgecloudlabs.edgecloudlabs.com"]
    resources: ["llmbackends"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: intelligent-router-cr-reader
  labels:
    app.kubernetes.io/name: intelligent-router
subjects:
  - kind: ServiceAccount
    name: intelligent-router
    namespace: intelligent-router-system
roleRef:
  kind: ClusterRole
  name: intelligent-router-cr-reader
  apiGroup: rbac.authorization.k8s.io
