# Model Router Configuration -- combined legacy format.
# Use pool.yaml + route.yaml (IntelligentPool / IntelligentRoute CRs) for
# production; this file provides a self-contained fallback for local testing.
# Hot-reloaded every 5 seconds -- update via ConfigMap without restarting.

# Backend models.
models:
  gpt-4.1:
    cost: 0.002
    domains: ["finance", "legal", "health", "general"]
    average_latency_ms: 120

  gpt-4.1-mini:
    cost: 0.0008
    domains: ["technology", "general"]
    average_latency_ms: 85

# Scoring weights.
# token_budget is additive and activates only when budget pressure > 0.
weights:
  domain: 0.5
  latency: 0.3
  cost: 0.2
  token_budget: 0.5

# Token budget (per API key, sliding window).
token_budget:
  threshold: 500
  quota: 1000
  window_seconds: 60

default_model: "gpt-4.1"

# M-Vert Pro ML classifier (BERT-based domain classification).
# Model weights are embedded in the image at /app/models/domain-classifier/.
# Built with: make build-ml  (Dockerfile.ml, CGO_ENABLED=1 + Rust candle library).
ml_classifier:
  enabled: true
  model_path: "/app/models/domain-classifier"
  mapping_path: "/app/models/domain-classifier/category_mapping.json"
  num_classes: 3          # 0 = auto-detect from model config.json
  use_cpu: true
  threshold: 0.6          # minimum confidence to accept a classification
