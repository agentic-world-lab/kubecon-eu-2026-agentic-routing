# IntelligentRoute CR -- defines routing signals, scoring weights, and token budget.
# Mirrors the vllm.ai/v1alpha1 IntelligentRoute CRD structure.
# Hot-reloaded by the router every 5 seconds (no restart required).
#
# In Kubernetes: back this with a ConfigMap and update with:
#   kubectl apply -f route.yaml
kind: IntelligentRoute
metadata:
  name: basic-routing
  namespace: model-router-system
spec:
  # Keyword signals for domain classification (pure Go, no ML models required).
  signals:
    keywords:
      - name: finance
        operator: OR
        caseSensitive: false
        keywords:
          - stock
          - investment
          - portfolio
          - dividend
          - trading
          - bond
          - equity
          - fund

      - name: legal
        operator: OR
        caseSensitive: false
        keywords:
          - law
          - court
          - contract
          - attorney
          - litigation
          - statute
          - lawsuit
          - jurisdiction

      - name: health
        operator: OR
        caseSensitive: false
        keywords:
          - health
          - medical
          - doctor
          - disease
          - treatment
          - symptom
          - hospital
          - medicine
          - patient

      - name: technology
        operator: OR
        caseSensitive: false
        keywords:
          - software
          - code
          - programming
          - algorithm
          - database
          - framework
          - cloud
          - kubernetes
          - docker

      - name: science
        operator: OR
        caseSensitive: false
        keywords:
          - physics
          - chemistry
          - biology
          - experiment
          - molecule
          - quantum
          - hypothesis
          - laboratory

  # Scoring weights for the routing formula:
  #   final = domain * domain_score
  #         + latency * latency_score
  #         + cost * cost_score
  #         + tokenBudget * (cost_score x budget_pressure)
  #
  # tokenBudget is additive and only activates when the API key token usage
  # exceeds the threshold. It does not need to be part of the 1.0 sum.
  weights:
    domain: 0.5
    latency: 0.3
    cost: 0.2
    tokenBudget: 0.5

  # Token budget: tracks tokens per API key in a sliding window.
  # - Below threshold: normal routing (budgetPressure = 0, tokenBudget term = 0).
  # - Between threshold and quota: linear ramp; cheaper models increasingly preferred.
  # - At or above quota: maximum pressure (budgetPressure = 1); cheapest model strongly favoured.
  tokenBudget:
    threshold: 500      # tokens before budget pressure starts
    quota: 1000         # tokens at which full pressure is applied
    windowSeconds: 60   # sliding window duration
