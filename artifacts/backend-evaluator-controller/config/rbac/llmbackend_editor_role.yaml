# This rule is not used by the project model-backend-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the edgecloudlabs.edgecloudlabs.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: model-backend-controller
    app.kubernetes.io/managed-by: kustomize
  name: llmbackend-editor-role
rules:
- apiGroups:
  - edgecloudlabs.edgecloudlabs.com
  resources:
  - llmbackends
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - edgecloudlabs.edgecloudlabs.com
  resources:
  - llmbackends/status
  verbs:
  - get
