# This rule is not used by the project model-backend-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over edgecloudlabs.edgecloudlabs.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: model-backend-controller
    app.kubernetes.io/managed-by: kustomize
  name: llmbackend-admin-role
rules:
- apiGroups:
  - edgecloudlabs.edgecloudlabs.com
  resources:
  - llmbackends
  verbs:
  - '*'
- apiGroups:
  - edgecloudlabs.edgecloudlabs.com
  resources:
  - llmbackends/status
  verbs:
  - get
