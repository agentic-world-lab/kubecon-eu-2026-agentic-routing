# This rule is not used by the project model-backend-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to edgecloudlabs.edgecloudlabs.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: model-backend-controller
    app.kubernetes.io/managed-by: kustomize
  name: llmbackend-viewer-role
rules:
- apiGroups:
  - edgecloudlabs.edgecloudlabs.com
  resources:
  - llmbackends
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - edgecloudlabs.edgecloudlabs.com
  resources:
  - llmbackends/status
  verbs:
  - get
