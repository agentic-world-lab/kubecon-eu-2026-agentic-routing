name: openrouter-pricing-mcp
framework: fastmcp-python
version: 0.1.2
description: MCP server for fetching token pricing from OpenRouter API
author: Felipe Vicens
email: fjvicens@gmail.com
secrets:
    local:
        enabled: false
        provider: env
        file: .env.local
    production:
        enabled: false
        provider: kubernetes
        secretName: openrouter-pricing-mcp-secrets-production
        namespace: default
    staging:
        enabled: false
        provider: kubernetes
        secretName: openrouter-pricing-mcp-secrets-staging
        namespace: default
