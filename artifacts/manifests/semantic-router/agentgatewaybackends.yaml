apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: multi-model
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
  # 1. GPT 4.1 (Prioridad alta para el re-routing)
  - matches:
    - headers:
      - type: Exact
        name: x-vsr-selected-model
        value: "gpt-4.1"
    backendRefs:
    - name: gpt-4.1
      namespace: agentgateway-system
      group: agentgateway.dev
      kind: AgentgatewayBackend

  # 2. GPT OSS
  - matches:
    - headers:
      - type: Exact
        name: x-vsr-selected-model
        value: "gpt-oss-120b"
    backendRefs:
    - name: gpt-oss-120b
      namespace: agentgateway-system
      group: agentgateway.dev
      kind: AgentgatewayBackend

  # 3. GPT 3.5
  - matches:
    - headers:
      - type: Exact
        name: x-vsr-selected-model
        value: "gpt-3.5-turbo"
    backendRefs:
    - name: gpt-3.5-turbo
      namespace: agentgateway-system
      group: agentgateway.dev
      kind: AgentgatewayBackend

  # 4. FALLBACK / DEFAULT (Llama 3.1)
  # Al no poner 'matches' con headers aquí, servirá tanto para 
  # la petición inicial de headers como para cuando no coincida nada más.
  - backendRefs:
    - name: llama-3.1-8b-instruct
      namespace: agentgateway-system
      group: agentgateway.dev
      kind: AgentgatewayBackend