apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-proc-grpc
  namespace: agentgateway-system
spec:
  selector:
    matchLabels:
      app: ext-proc-grpc
  replicas: 1
  template:
    metadata:
      labels:
        app: ext-proc-grpc
    spec:
      containers:
        - name: ext-proc-grpc
          image: antonioberben/extproc-agentic-routing:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 18080
          env:
            - name: ROUTING_POLICY_FILE
              value: "/etc/policy/policy.rego"
            - name: DEFAULT_ROUTE
              value: "cpu"
            - name: ROUTING_HEADER_NAME
              value: "x-route-picker"
            - name: LOG_LEVEL
              value: debug
          volumeMounts:
            - name: policy
              mountPath: /etc/policy
              readOnly: true
      volumes:
        - name: policy
          configMap:
            name: route-picker-policy
---
apiVersion: v1
kind: Service
metadata:
  name: ext-proc-grpc
  namespace: agentgateway-system
spec:
  ports:
  - port: 18080
    targetPort: 18080
    protocol: TCP
    appProtocol: kubernetes.io/h2c  # Required for gRPC
  selector:
    app: ext-proc-grpc
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: route-picker-policy
  namespace: agentgateway-system
data:
  policy.rego: |
    package routepicker

    # Policy: compute the header value to add. The server evaluates
    # `data.routepicker.header_value` and expects a string.

    # Default value when no override header is present or policy does not match.
    default header_value = "cpu"

    # If the request contains a header `x-example` equal to
    # "cpu" then return "cpu" as the chosen route.
    # header_value = "cpu" {
    #     h := input.headers["x-example"]
    #     h == "cpu"
    # }

    header_value = h { h := input.headers["x-example"] }

    # You can extend this rule to accept other override values or to return the
    # header value directly (e.g., `header_value = h { h := input.headers["x-example"] }`).
