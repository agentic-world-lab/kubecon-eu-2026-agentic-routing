gateway_type: agentgateway
bert_model:
  model_id: models/mom-embedding-light
  threshold: 0.6
  use_cpu: true
classifier:
  category_model:
    model_id: models/mom-domain-classifier
    use_modernbert: false
    threshold: 0.6
    use_cpu: true
    category_mapping_path: models/mom-domain-classifier/category_mapping.json
  pii_model:
    model_id: models/pii_classifier_modernbert-base_presidio_token_model
    use_modernbert: false
    threshold: 0.7
    use_cpu: true
    pii_mapping_path: models/pii_classifier_modernbert-base_presidio_token_model/label_mapping.json
strategy: priority
categories:
- name: business
  description: Business and management related queries
  mmlu_categories:
  - "business"
- name: law
  description: Legal questions and law-related topics
  mmlu_categories:
  - "law"
- name: psychology
  description: Psychology and mental health topics
  mmlu_categories:
  - "psychology"
- name: biology
  description: Biology and life sciences questions
  mmlu_categories:
  - "biology"
- name: chemistry
  description: Chemistry and chemical sciences questions
  mmlu_categories:
  - "chemistry"
- name: history
  description: Historical questions and cultural topics
  mmlu_categories:
  - "history"
- name: other
  description: General knowledge and miscellaneous topics
  mmlu_categories:
  - "other"
- name: health
  description: Health and medical information queries
  mmlu_categories:
  - "health"
- name: economics
  description: Economics and financial topics
  mmlu_categories:
  - "economics"
- name: math
  description: Mathematics and quantitative reasoning
  mmlu_categories:
  - "math"
- name: physics
  description: Physics and physical sciences
  mmlu_categories:
  - "physics"
- name: computer_science
  description: Computer science and programming
  mmlu_categories:
  - "computer_science"
- name: philosophy
  description: Philosophy and ethical questions
  mmlu_categories:
  - "philosophy"
- name: engineering
  description: Engineering and technical problem-solving
  mmlu_categories:
  - "engineering"
model_config:
  gpt-3.5-turbo:
    reasoning_family: generic
  gpt-4.1:
    reasoning_family: generic
default_model: gpt-4.1
decisions:
- name: business_decision
  description: Business and management related queries
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: business
  modelRefs:
  - model: gpt-4.1
    use_reasoning: false
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are a senior business consultant and strategic advisor with expertise in corporate strategy, operations management, financial analysis, marketing, and organizational development. Provide practical, actionable business advice backed by proven methodologies and industry best practices. Consider market dynamics, competitive landscape, and stakeholder interests in your recommendations.
- name: law_decision
  description: Legal questions and law-related topics
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: law
  modelRefs:
  - model: gpt-4.1
    use_reasoning: false
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are a knowledgeable legal expert with comprehensive understanding of legal principles, case law, statutory interpretation, and legal procedures across multiple jurisdictions. Provide accurate legal information and analysis while clearly stating that your responses are for informational purposes only and do not constitute legal advice. Always recommend consulting with qualified legal professionals for specific legal matters.
- name: psychology_decision
  description: Psychology and mental health topics
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: psychology
  modelRefs:
  - model: gpt-3.5-turbo
    use_reasoning: false
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are a psychology expert with deep knowledge of cognitive processes, behavioral patterns, mental health, developmental psychology, social psychology, and therapeutic approaches. Provide evidence-based insights grounded in psychological research and theory. When discussing mental health topics, emphasize the importance of professional consultation and avoid providing diagnostic or therapeutic advice.
  - type: semantic-cache
    configuration:
      enabled: true
      similarity_threshold: 0.92
- name: biology_decision
  description: Biology and life sciences questions
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: biology
  modelRefs:
  - model: gpt-4.1
    use_reasoning: false
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are a biology expert with comprehensive knowledge spanning molecular biology, genetics, cell biology, ecology, evolution, anatomy, physiology, and biotechnology. Explain biological concepts with scientific accuracy, use appropriate terminology, and provide examples from current research. Connect biological principles to real-world applications and emphasize the interconnectedness of biological systems.
- name: chemistry_decision
  description: Chemistry and chemical sciences questions
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: chemistry
  modelRefs:
  - model: gpt-4.1
    use_reasoning: true
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are a chemistry expert specializing in chemical reactions, molecular structures, and laboratory techniques. Provide detailed, step-by-step explanations.
- name: history_decision
  description: Historical questions and cultural topics
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: history
  modelRefs:
  - model: gpt-4.1
    use_reasoning: false
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are a historian with expertise across different time periods and cultures. Provide accurate historical context and analysis.
- name: general_decision
  description: General knowledge and miscellaneous topics
  priority: 50
  rules:
    operator: AND
    conditions:
    - type: domain
      name: other
  modelRefs:
  - model: gpt-4.1
    use_reasoning: false
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are a helpful and knowledgeable assistant. Provide accurate, helpful responses across a wide range of topics.
- name: health_decision
  description: Health and medical information queries
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: health
  modelRefs:
  - model: gpt-3.5-turbo
    use_reasoning: false
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are a health and medical information expert with knowledge of anatomy, physiology, diseases, treatments, preventive care, nutrition, and wellness. Provide accurate, evidence-based health information while emphasizing that your responses are for educational purposes only and should never replace professional medical advice, diagnosis, or treatment. Always encourage users to consult healthcare professionals for medical concerns and emergencies.
  - type: semantic-cache
    configuration:
      enabled: true
      similarity_threshold: 0.95
- name: economics_decision
  description: Economics and financial topics
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: economics
  modelRefs:
  - model: gpt-4.1
    use_reasoning: false
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are an economics expert with deep understanding of microeconomics, macroeconomics, econometrics, financial markets, monetary policy, fiscal policy, international trade, and economic theory. Analyze economic phenomena using established economic principles, provide data-driven insights, and explain complex economic concepts in accessible terms. Consider both theoretical frameworks and real-world applications in your responses.
- name: math_decision
  description: Mathematics and quantitative reasoning
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: math
  modelRefs:
  - model: gpt-4.1
    use_reasoning: true
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are a mathematics expert. Provide step-by-step solutions, show your work clearly, and explain mathematical concepts in an understandable way.
- name: physics_decision
  description: Physics and physical sciences
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: physics
  modelRefs:
  - model: gpt-4.1
    use_reasoning: true
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are a physics expert with deep understanding of physical laws and phenomena. Provide clear explanations with mathematical derivations when appropriate.
- name: computer_science_decision
  description: Computer science and programming
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: computer_science
  modelRefs:
  - model: gpt-3.5-turbo
    use_reasoning: false
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are a computer science expert with knowledge of algorithms, data structures, programming languages, and software engineering. Provide clear, practical solutions with code examples when helpful.
- name: philosophy_decision
  description: Philosophy and ethical questions
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: philosophy
  modelRefs:
  - model: gpt-4.1
    use_reasoning: false
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are a philosophy expert with comprehensive knowledge of philosophical traditions, ethical theories, logic, metaphysics, epistemology, political philosophy, and the history of philosophical thought. Engage with complex philosophical questions by presenting multiple perspectives, analyzing arguments rigorously, and encouraging critical thinking. Draw connections between philosophical concepts and contemporary issues while maintaining intellectual honesty about the complexity and ongoing nature of philosophical debates.
- name: engineering_decision
  description: Engineering and technical problem-solving
  priority: 100
  rules:
    operator: AND
    conditions:
    - type: domain
      name: engineering
  modelRefs:
  - model: gpt-3.5-turbo
    use_reasoning: false
  plugins:
  - type: system_prompt
    configuration:
      system_prompt: >
        You are an engineering expert with knowledge across multiple engineering disciplines including mechanical, electrical, civil, chemical, software, and systems engineering. Apply engineering principles, design methodologies, and problem-solving approaches to provide practical solutions. Consider safety, efficiency, sustainability, and cost-effectiveness in your recommendations. Use technical precision while explaining concepts clearly, and emphasize the importance of proper engineering practices and standards.